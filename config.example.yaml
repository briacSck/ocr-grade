# Example ocr-grade configuration. Copy to config.yaml and adjust.
#
# Any field here can be overridden by an env var named
# OCR_GRADE__<FIELD>__<NESTED_FIELD> (double underscore), e.g.
# OCR_GRADE__MISTRAL__MODEL=mistral-ocr-2512 or OCR_GRADE__DPI=250.
# The one exception is mistral.api_key, which is always read from the plain
# MISTRAL_API_KEY env var and must never appear in this file.

input_dir: ./scans
output_dir: ./out
cache_dir: ./.cache

# Rasterization DPI. Lower to 250 if output file size becomes a problem.
dpi: 300

# Minimum estimated native scan DPI to accept. Files below this are flagged in
# ingestion and skipped. Lower to ~140 if your scanner exports just under 150.
min_native_dpi: 150

# Course preset name, e.g. PE101 / P156. Used for output filenames and
# (later) per-course masking templates.
course_preset: PE101

redaction:
  # Auto-detect each exam's page rotation and normalize it to upright before
  # masking, so identity is found wherever the scanner placed the header. Only
  # applies when header_box is null. Set false if your scans are already upright
  # and you want to skip the orientation-detection OCR.
  auto_orient: true
  # Fixed header bounding box [x, y, w, h] in pixels at the configured DPI,
  # or omit/null to rely on regex-only masking.
  header_box: null
  regex_patterns:
    - 'SID[:\s]*\d{7,10}'
    - 'Name[:\s]*[A-Z][a-z]+ [A-Z][a-z]+'

mistral:
  # API key is read from the MISTRAL_API_KEY env var, never from this file.
  model: mistral-ocr-latest
  base_url: null
  timeout_s: 60
  include_image_base64: false

# USD cost per page, used only for reporting (no hard cap).
mistral_price_per_page: 0.001

preprocess_steps:
  deskew: true
  denoise: true
  contrast: true
